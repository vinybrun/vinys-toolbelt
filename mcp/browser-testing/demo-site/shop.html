<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop · Nebula Market</title>
  <link rel="stylesheet" href="css/styles.css" />
  
</head>
<body data-page="shop">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html" aria-label="Nebula Market home">
        <span class="brand-mark" aria-hidden="true">✦</span>
        Nebula Market
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html" class="cart-pill" id="nav-cart">
          Cart <span class="count" data-cart-count>0</span>
        </a>
        <a href="login.html">Account</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>
  <main>

    <div class="container" style="padding-top:2rem">
      <div class="section-title">
        <div>
          <h1 style="margin:0;font-size:1.8rem">Shop</h1>
          <p id="result-count">Loading…</p>
        </div>
      </div>
      <div class="toolbar">
        <div>
          <label for="search">Search</label>
          <input id="search" type="search" placeholder="Search products…" aria-label="Search products" />
        </div>
        <div>
          <label for="category-filter">Category</label>
          <select id="category-filter" aria-label="Filter by category">
            <option value="all">All</option>
            <option value="home">Home</option>
            <option value="kitchen">Kitchen</option>
            <option value="stationery">Stationery</option>
            <option value="audio">Audio</option>
            <option value="outdoor">Outdoor</option>
            <option value="accessories">Accessories</option>
            <option value="decor">Decor</option>
            <option value="tech">Tech</option>
          </select>
        </div>
      </div>
      <div class="grid-3" id="product-grid"></div>
      <div class="empty-state" id="shop-empty" hidden>
        <p>No products match your filters.</p>
        <button class="btn btn-secondary" type="button" onclick="document.getElementById('search').value='';document.getElementById('category-filter').value='all';document.getElementById('search').dispatchEvent(new Event('input'))">Clear filters</button>
      </div>
    </div>

  </main>
  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <strong style="color:var(--text)">Nebula Market</strong>
        <p>Curated goods for explorers of the everyday. Demo storefront for browser MCP testing.</p>
      </div>
      <div>
        <strong style="color:var(--text)">Explore</strong>
        <p><a href="shop.html">All products</a><br/><a href="cart.html">Your cart</a></p>
      </div>
      <div>
        <strong style="color:var(--text)">Support</strong>
        <p><a href="contact.html">Contact</a><br/><a href="login.html">Sign in</a></p>
      </div>
    </div>
  </footer>
  <script src="js/app.js"></script>
</body>
</html>
