<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart · Nebula Market</title>
  <link rel="stylesheet" href="css/styles.css" />
  
</head>
<body data-page="cart">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html" aria-label="Nebula Market home">
        <span class="brand-mark" aria-hidden="true">✦</span>
        Nebula Market
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html" class="cart-pill" id="nav-cart">
          Cart <span class="count" data-cart-count>0</span>
        </a>
        <a href="login.html">Account</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>
  <main>

    <div class="container" style="padding-top:2rem">
      <h1>Your cart</h1>
      <div id="cart-empty" class="empty-state panel" hidden>
        <p>Your cart is empty.</p>
        <a class="btn btn-primary" href="shop.html">Continue shopping</a>
      </div>
      <div class="two-col" id="cart-table-wrap">
        <div class="panel" style="overflow-x:auto">
          <table class="cart-table" aria-label="Cart items">
            <thead>
              <tr><th>Item</th><th>Price</th><th>Qty</th><th>Line</th><th></th></tr>
            </thead>
            <tbody id="cart-body"></tbody>
          </table>
        </div>
        <div id="cart-summary"></div>
      </div>
    </div>

  </main>
  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <strong style="color:var(--text)">Nebula Market</strong>
        <p>Curated goods for explorers of the everyday. Demo storefront for browser MCP testing.</p>
      </div>
      <div>
        <strong style="color:var(--text)">Explore</strong>
        <p><a href="shop.html">All products</a><br/><a href="cart.html">Your cart</a></p>
      </div>
      <div>
        <strong style="color:var(--text)">Support</strong>
        <p><a href="contact.html">Contact</a><br/><a href="login.html">Sign in</a></p>
      </div>
    </div>
  </footer>
  <script src="js/app.js"></script>
</body>
</html>
